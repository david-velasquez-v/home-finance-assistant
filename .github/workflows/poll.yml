name: expenses-poll

on:
  schedule:
    - cron: '0 13 * * *'   # 08:00 COT
    - cron: '0 1 * * *'    # 20:00 COT (01:00 UTC next day)
  workflow_dispatch: {}      # manual "Run workflow" button for testing

concurrency:                 # never let two runs overlap / double-process
  group: expenses-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --no-dev --frozen   # runtime only; uv provisions Python 3.12 per requires-python

      - name: Run expenses poll
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_DAVID: ${{ secrets.TELEGRAM_USER_DAVID }}
          TELEGRAM_USER_DANIELA: ${{ secrets.TELEGRAM_USER_DANIELA }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python -m expenses

      - name: Notify Telegram on failure
        if: failure()
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_USER_DAVID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode "text=expenses-poll failed. Logs: ${RUN_URL}"
